# FastRG system configuration
# It uses libconfig to parse config file

# FastRG user count 
UserCount = 10;

# FastRG loglvl
Loglvl = "DBG";
LogPath = "/var/log/fastrg/fastrg.log";

NodeGrpcUnixSocket = "unix:///var/run/fastrg/fastrg.sock";
NodeGrpcPort = "50052";

# Controller endpoint
ControllerAddress = "192.168.10.14:50051";
HeartbeatInterval = 30;

# Etcd endpoint
EtcdEndpoints = "192.168.10.14:2379";

# DNS Proxy
DnsProxyEnabled = 1;

# I40E DDP package path (optional, for X710 PPPoE RSS support).
# Requires the Intel Ethernet 700 Series PPPoE DDP package (ppp-oe-ol2tpv2.pkgo).
# Download from https://www.intel.com/content/www/us/en/download/15084/intel-ethernet-adapter-complete-driver-pack.html
# and replace the .pkgo file path below, then uncomment to enable
# PPPoE-aware multi-queue RSS on Intel X710 NICs.
# I40eDdpPkgPath = "/lib/firmware/updates/intel/i40e/ddp/ppp-oe-ol2tpv2.pkgo";
